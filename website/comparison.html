<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Overall Performance Comparison</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, 'Segoe UI', sans-serif;
      background: #e8e8e8;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 40px 16px;
    }
    .card {
      background: #ffffff;
      border: 1px solid #c8c8c8;
      padding: 28px 32px 24px;
      box-shadow: 0 3px 14px rgba(0,0,0,0.13);
      width: 860px;
      max-width: 100%;
    }
    canvas { display: block; width: 100%; height: auto; }
  </style>
</head>
<body>
<div class="card">
  <canvas id="chart" width="796" height="460"></canvas>
</div>

<script>
window.addEventListener('load', function () {
  const canvas = document.getElementById('chart');
  const ctx    = canvas.getContext('2d');
  const W = canvas.width;
  const H = canvas.height;

  // ── Palette ────────────────────────────────────────────────────────────────
  const C_FW       = '#4472C4';
  const C_FW_DARK  = '#2f55a0';
  const C_TS       = '#ED7D31';
  const C_TS_DARK  = '#c46115';
  const C_GRID     = '#d8d8d8';
  const C_AXIS     = '#555';
  const C_TEXT     = '#222';

  // ── Chart layout ───────────────────────────────────────────────────────────
  const ml = 72, mt = 72, mr = 28, mb = 110;
  const cX = ml, cY = mt;
  const cW = W - ml - mr;
  const cH = H - mt - mb;
  const yBot = cY + cH;

  // ── Data ───────────────────────────────────────────────────────────────────
  // Per-group scale: each group scaled so taller bar = 90% of cH.
  // Actual values are labelled on bars; Y-axis ticks show the shared 0-100% reference.
  const groups = [
    { lbl1: 'Average Voltage', lbl2: 'Vavg (V)',      fw: 2.32, ts: 1.94 },
    { lbl1: 'Average Current', lbl2: 'Iavg (mA)',     fw: 0.49, ts: 0.41 },
    { lbl1: 'Average Power',   lbl2: 'Pavg (mW)',     fw: 1.23, ts: 0.86 },
    { lbl1: 'Stabilization',   lbl2: 'Time Ts (s)',   fw: 3,    ts: 4    }
  ];

  const TARGET_H = cH * 0.88;           // tallest bar in each group

  // ── Title ──────────────────────────────────────────────────────────────────
  ctx.fillStyle = C_TEXT;
  ctx.font = 'bold 15px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('Overall Performance Comparison', W / 2, 22);
  ctx.font = '12px Arial';
  ctx.fillStyle = '#444';
  ctx.fillText('Full-Wave Bridge Rectifier vs 2-Stage CWVM Rectifier', W / 2, 42);

  // ── Y-axis label ───────────────────────────────────────────────────────────
  ctx.save();
  ctx.translate(15, cY + cH / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.textAlign = 'center';
  ctx.font = '11px Arial';
  ctx.fillStyle = '#555';
  ctx.fillText('Measured Value', 0, 0);
  ctx.restore();

  // ── Grid lines (5 lines at 20 % intervals) ─────────────────────────────────
  for (let p = 0; p <= 4; p++) {
    const y = yBot - (p / 4) * cH;
    ctx.beginPath();
    ctx.strokeStyle = C_GRID;
    ctx.lineWidth = 1;
    ctx.moveTo(cX, y);
    ctx.lineTo(cX + cW, y);
    ctx.stroke();

    ctx.fillStyle = '#777';
    ctx.font = '10px Arial';
    ctx.textAlign = 'right';
    ctx.fillText((p * 25) + '%', cX - 6, y + 4);
  }

  // ── Axes ───────────────────────────────────────────────────────────────────
  ctx.beginPath();
  ctx.strokeStyle = C_AXIS;
  ctx.lineWidth = 1.5;
  ctx.moveTo(cX, cY);
  ctx.lineTo(cX, yBot);
  ctx.moveTo(cX, yBot);
  ctx.lineTo(cX + cW, yBot);
  ctx.stroke();

  // ── Bars ───────────────────────────────────────────────────────────────────
  const gW    = cW / groups.length;
  const barW  = 52;
  const gap   = 10;

  groups.forEach(function (g, i) {
    const gcx  = cX + gW * i + gW / 2;
    const fwX  = gcx - gap / 2 - barW;
    const tsX  = gcx + gap / 2;
    const mx   = Math.max(g.fw, g.ts);
    const scale = TARGET_H / mx;

    // ── FW bar ────────────────────────────────────────────────────────────
    const fwH = g.fw * scale;
    const fwY = yBot - fwH;
    const fwGrad = ctx.createLinearGradient(0, fwY, 0, yBot);
    fwGrad.addColorStop(0, '#6b93d6');
    fwGrad.addColorStop(1, C_FW);
    ctx.fillStyle = fwGrad;
    ctx.fillRect(fwX, fwY, barW, fwH);
    ctx.strokeStyle = C_FW_DARK;
    ctx.lineWidth = 0.8;
    ctx.strokeRect(fwX, fwY, barW, fwH);

    // FW value label
    ctx.fillStyle = C_TEXT;
    ctx.font = 'bold 11.5px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(String(g.fw), fwX + barW / 2, fwY - 6);

    // ── 2S bar ────────────────────────────────────────────────────────────
    const tsH = g.ts * scale;
    const tsY = yBot - tsH;
    const tsGrad = ctx.createLinearGradient(0, tsY, 0, yBot);
    tsGrad.addColorStop(0, '#f4a266');
    tsGrad.addColorStop(1, C_TS);
    ctx.fillStyle = tsGrad;
    ctx.fillRect(tsX, tsY, barW, tsH);
    ctx.strokeStyle = C_TS_DARK;
    ctx.lineWidth = 0.8;
    ctx.strokeRect(tsX, tsY, barW, tsH);

    // 2S value label
    ctx.fillStyle = C_TEXT;
    ctx.font = 'bold 11.5px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(String(g.ts), tsX + barW / 2, tsY - 6);

    // ── X-axis group labels ───────────────────────────────────────────────
    ctx.fillStyle = '#333';
    ctx.font = '11px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(g.lbl1, gcx, yBot + 17);
    ctx.font = 'bold 11px Arial';
    ctx.fillText(g.lbl2, gcx, yBot + 32);
  });

  // ── Legend ─────────────────────────────────────────────────────────────────
  const items = [
    { label: 'Full-Wave Bridge Rectifier', color: C_FW },
    { label: '2-Stage CWVM Rectifier',     color: C_TS }
  ];

  const legendBlockW = 16;
  const legendBlockH = 14;
  const legendSpacing = 200;
  const legendStartX  = W / 2 - legendSpacing / 2 - 80;
  const legendY = H - 46;

  items.forEach(function (item, i) {
    const x = legendStartX + i * legendSpacing;
    ctx.fillStyle = item.color;
    ctx.fillRect(x, legendY, legendBlockW, legendBlockH);
    ctx.strokeStyle = '#aaa';
    ctx.lineWidth = 0.6;
    ctx.strokeRect(x, legendY, legendBlockW, legendBlockH);
    ctx.fillStyle = '#222';
    ctx.font = '12px Arial';
    ctx.textAlign = 'left';
    ctx.fillText(item.label, x + legendBlockW + 7, legendY + 11);
  });
});
</script>
</body>
</html>
